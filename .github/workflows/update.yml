name: 청년정책 데이터 자동 갱신

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests

      - name: 온통청년 API 데이터 수집
        run: python fetch_policies.py
        env:
          API_KEY: ${{ secrets.YOUTH_API_KEY }}

      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "자동갱신: 청년정책 데이터 업데이트 $(date +'%Y-%m-%d')"
          git push
