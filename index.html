<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경기도 청년정책 상담 대시보드 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F0F2F5; --white: #FFFFFF; --border: #E4E7EC;
  --text: #111827; --text2: #6B7280; --text3: #9CA3AF;
  --accent: #1B5E42; --accent-light: #E8F5EE;
  --ing: #059669; --ing-bg: #ECFDF5; --ing-bd: #A7F3D0;
  --soon: #D97706; --soon-bg: #FFFBEB; --soon-bd: #FDE68A;
  --done: #6B7280; --done-bg: #F9FAFB; --done-bd: #E5E7EB;
  --unknown: #6366F1; --unknown-bg: #EEF2FF; --unknown-bd: #C7D2FE;
}
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

.header {
  background: var(--accent); color: #fff; padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 200;
}
.header-title { font-size: 16px; font-weight: 700; }
.header-date { font-size: 12px; opacity: .7; }
.header-counts { display: flex; gap: 16px; font-size: 12px; }
.hc { display: flex; align-items: center; gap: 5px; }
.hc-dot { width: 8px; height: 8px; border-radius: 50%; }
.hc-dot.ing { background: #34D399; }
.hc-dot.soon { background: #FCD34D; }
.hc-dot.unknown { background: #A5B4FC; }

.filterbar {
  background: var(--white); border-bottom: 1px solid var(--border);
  padding: 12px 20px; display: flex; flex-direction: column; gap: 10px;
  position: sticky; top: 49px; z-index: 150;
}
.filter-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.filter-label { font-size: 11px; font-weight: 600; color: var(--text2); min-width: 40px; }
.search-box {
  display: flex; align-items: center; gap: 6px;
  border: 1.5px solid var(--border); border-radius: 8px;
  padding: 6px 10px; background: var(--bg); flex: 1; max-width: 320px;
}
.search-box input { border: none; background: transparent; outline: none; font-size: 13px; font-family: inherit; width: 100%; }

.chip {
  padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
  border: 1.5px solid var(--border); background: var(--white); cursor: pointer;
  transition: all .15s; white-space: nowrap; color: var(--text2);
}
.chip:hover { border-color: var(--accent); color: var(--accent); }
.chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.chip.status-ing.active { background: var(--ing); border-color: var(--ing); }
.chip.status-soon.active { background: var(--soon); border-color: var(--soon); }
.chip.status-done.active { background: var(--done); border-color: var(--done); }
.chip.status-unknown.active { background: var(--unknown); border-color: var(--unknown); }

.main { padding: 16px 20px; max-width: 1400px; margin: 0 auto; }
.result-bar {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
}
.result-count { font-size: 13px; color: var(--text2); }
.result-count strong { color: var(--text); }
.sort-select {
  font-size: 12px; border: 1px solid var(--border); border-radius: 6px;
  padding: 4px 8px; font-family: inherit; background: var(--white); color: var(--text2);
}

.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }

.card {
  background: var(--white); border: 1.5px solid var(--border); border-radius: 12px;
  padding: 16px; cursor: pointer; transition: box-shadow .15s, transform .1s;
  display: flex; flex-direction: column; gap: 10px;
}
.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); transform: translateY(-1px); }
.card.status-ing  { border-left: 4px solid var(--ing); }
.card.status-soon { border-left: 4px solid var(--soon); }
.card.status-done { border-left: 4px solid var(--done); opacity: .6; }
.card.status-unknown { border-left: 4px solid var(--border); }

.card-badges { display: flex; gap: 6px; flex-wrap: wrap; }
.badge {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 600; white-space: nowrap;
}
.badge-status-모집중   { background: var(--ing-bg);     color: var(--ing);     border: 1px solid var(--ing-bd); }
.badge-status-모집예정 { background: var(--soon-bg);    color: var(--soon);    border: 1px solid var(--soon-bd); }
.badge-status-마감     { background: var(--done-bg);    color: var(--done);    border: 1px solid var(--done-bd); }
.badge-status-미정     { background: var(--unknown-bg); color: var(--unknown); border: 1px solid var(--unknown-bd); }
.badge-city { background: #F3F4F6; color: #374151; border: 1px solid #E5E7EB; }
.badge-경기도 { background: #F0FDF4; color: #166534; border: 1px solid #BBF7D0; font-weight:700; }
.badge-field-일자리 { background: #EFF6FF; color: #1D4ED8; border: 1px solid #BFDBFE; }
.badge-field-주거 { background: #FFF7ED; color: #C2410C; border: 1px solid #FED7AA; }
.badge-field-교육직업훈련 { background: #F5F3FF; color: #6D28D9; border: 1px solid #DDD6FE; }
.badge-field-금융복지문화 { background: #F0FDFA; color: #0F766E; border: 1px solid #99F6E4; }
.badge-field-참여권리 { background: #FFF1F2; color: #BE123C; border: 1px solid #FECDD3; }

.card-title { font-size: 14px; font-weight: 600; line-height: 1.4; }
.card-recruit { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
.card-recruit-text { font-weight: 600; }
.card-recruit-text.ing { color: var(--ing); }
.card-recruit-text.soon { color: var(--soon); }
.card-recruit-text.unknown { color: var(--text3); }
.card-recruit-text.done { color: var(--done); }
.card-summary {
  font-size: 12px; color: var(--text2); line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.card-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.card-org { font-size: 11px; color: var(--text3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-link { font-size: 11px; color: var(--accent); font-weight: 500; text-decoration: none; white-space: nowrap; }
.card-link:hover { text-decoration: underline; }

.overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
  z-index: 500; align-items: center; justify-content: center; padding: 20px;
}
.overlay.open { display: flex; }
.modal {
  background: var(--white); border-radius: 16px; width: 100%; max-width: 600px;
  max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.2);
}
.modal-header {
  padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  position: sticky; top: 0; background: var(--white); border-radius: 16px 16px 0 0;
}
.modal-header-left { display: flex; flex-direction: column; gap: 8px; flex: 1; }
.modal-title { font-size: 17px; font-weight: 700; line-height: 1.4; }
.modal-close {
  width: 30px; height: 30px; border: none; background: var(--bg); border-radius: 50%;
  cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
.modal-section-title { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: .05em; margin-bottom: 6px; }
.modal-text { font-size: 13px; line-height: 1.7; color: var(--text); white-space: pre-line; }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-item { background: var(--bg); border-radius: 8px; padding: 10px 12px; }
.modal-item-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.modal-item-value { font-size: 13px; font-weight: 500; line-height: 1.4; }
.modal-item-value.ing { color: var(--ing); }
.modal-item-value.soon { color: var(--soon); }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
.btn {
  flex: 1; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 600;
  font-family: inherit; cursor: pointer; border: none; transition: opacity .15s;
}
.btn:hover { opacity: .85; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary { background: var(--bg); color: var(--text2); border: 1px solid var(--border); }

.empty { text-align: center; padding: 60px 20px; color: var(--text3); }
.loading { text-align: center; padding: 80px 20px; color: var(--text3); }

@media (max-width: 600px) {
  .header-counts { display: none; }
  .cards { grid-template-columns: 1fr; }
  .modal-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header class="header">
  <div>
    <div class="header-title">경기도 청년정책 상담 대시보드</div>
    <div class="header-date">2026 시행계획 · 경기도 + 31개 시군</div>
  </div>
  <div class="header-counts">
    <div class="hc"><div class="hc-dot ing"></div><span id="cnt-ing">-</span> 모집중</div>
    <div class="hc"><div class="hc-dot soon"></div><span id="cnt-soon">-</span> 모집예정</div>
    <div class="hc"><div class="hc-dot unknown"></div><span id="cnt-unknown">-</span> 미정</div>
  </div>
</header>

<div class="filterbar">
  <div class="filter-row">
    <div class="search-box">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="사업명, 내용으로 검색..." autocomplete="off">
    </div>
  </div>
  <div class="filter-row">
    <span class="filter-label">상태</span>
    <div class="chip status-ing active" data-status="모집중" onclick="toggleStatus('모집중',this)">🟢 모집중</div>
    <div class="chip status-soon active" data-status="모집예정" onclick="toggleStatus('모집예정',this)">🟡 모집예정</div>
    <div class="chip status-unknown active" data-status="미정" onclick="toggleStatus('미정',this)">⚪ 미정</div>
    <div class="chip status-done" data-status="마감" onclick="toggleStatus('마감',this)">⚫ 마감</div>
  </div>
  <div class="filter-row">
    <span class="filter-label">지역</span>
    <div id="city-chips" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
  </div>
  <div class="filter-row">
    <span class="filter-label">분야</span>
    <div class="chip active" data-field="all" onclick="setField('all',this)">전체</div>
    <div class="chip" data-field="일자리" onclick="setField('일자리',this)">💼 일자리</div>
    <div class="chip" data-field="주거" onclick="setField('주거',this)">🏠 주거</div>
    <div class="chip" data-field="교육ㆍ직업훈련" onclick="setField('교육ㆍ직업훈련',this)">📚 교육</div>
    <div class="chip" data-field="금융ㆍ복지ㆍ문화" onclick="setField('금융ㆍ복지ㆍ문화',this)">💰 금융·복지</div>
    <div class="chip" data-field="참여권리" onclick="setField('참여권리',this)">🤝 참여권리</div>
  </div>
</div>

<main class="main">
  <div class="result-bar">
    <div class="result-count" id="result-count"></div>
    <select class="sort-select" id="sort-select" onchange="render()">
      <option value="status">모집상태순</option>
      <option value="city">지역순</option>
      <option value="field">분야순</option>
    </select>
  </div>
  <div class="cards" id="cards"><div class="loading">데이터를 불러오는 중...</div></div>
</main>

<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-header-left">
        <div class="modal-badges" id="modal-badges"></div>
        <div class="modal-title" id="modal-title"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div>
        <div class="modal-section-title">📋 모집정보</div>
        <div class="modal-grid" id="modal-info"></div>
      </div>
      <div>
        <div class="modal-section-title">📌 주요내용</div>
        <div class="modal-text" id="modal-content"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="btn-copy" onclick="copyContact()">📋 문의처 복사</button>
      <button class="btn btn-primary" id="btn-link" onclick="openLink()">🔗 신청 바로가기</button>
    </div>
  </div>
</div>

<script>
let DATA = [];
let state = { statuses: new Set(['모집중','모집예정','미정']), city: 'all', field: 'all', query: '' };
let currentItem = null;

fetch('data.json')
  .then(r => r.json())
  .then(json => {
    DATA = json;
    buildCityChips();
    document.getElementById('cnt-ing').textContent = DATA.filter(d=>d.모집상태==='모집중').length;
    document.getElementById('cnt-soon').textContent = DATA.filter(d=>d.모집상태==='모집예정').length;
    document.getElementById('cnt-unknown').textContent = DATA.filter(d=>d.모집상태==='미정').length;
    render();
  })
  .catch(() => {
    document.getElementById('cards').innerHTML = '<div class="empty"><p>데이터를 불러오지 못했습니다.</p></div>';
  });

function buildCityChips() {
  const sigungu = [...new Set(DATA.filter(d=>d.시군!=='경기도').map(d=>d.시군))].sort((a,b)=>a.localeCompare(b,'ko'));
  const cities = ['all', '경기도', ...sigungu];
  document.getElementById('city-chips').innerHTML = cities.map(c => {
    const label = c==='all' ? '전체' : c==='경기도' ? '🌐 경기도 전체' : c;
    return `<div class="chip ${c==='all'?'active':''}" data-city="${c}" onclick="setCity('${c}',this)">${label}</div>`;
  }).join('');
}

function getFiltered() {
  let items = DATA;
  if (state.city !== 'all') {
    if (state.city === '경기도') {
      items = items.filter(d => d.시군 === '경기도');
    } else {
      // 특정 시군 선택 시 → 해당 시군 + 경기도 광역 정책 함께 표시
      items = items.filter(d => d.시군 === state.city || d.시군 === '경기도');
    }
  }
  if (state.field !== 'all') items = items.filter(d => d.분야 === state.field);
  if (state.statuses.size > 0) items = items.filter(d => state.statuses.has(d.모집상태 || '미정'));
  if (state.query) {
    const q = state.query.toLowerCase();
    items = items.filter(d =>
      (d.사업명||'').toLowerCase().includes(q) ||
      (d.주요내용||'').toLowerCase().includes(q) ||
      (d.시군||'').toLowerCase().includes(q)
    );
  }
  const STATUS_ORDER = {'모집중':0,'모집예정':1,'미정':2,'마감':3};
  const FIELD_ORDER  = ['일자리','주거','교육ㆍ직업훈련','금융ㆍ복지ㆍ문화','참여권리'];
  const sort = document.getElementById('sort-select').value;
  if (sort === 'status') {
    items = [...items].sort((a,b) => (STATUS_ORDER[a.모집상태]??2)-(STATUS_ORDER[b.모집상태]??2));
  } else if (sort === 'city') {
    items = [...items].sort((a,b) => {
      if (a.시군==='경기도' && b.시군!=='경기도') return -1;
      if (b.시군==='경기도' && a.시군!=='경기도') return 1;
      return a.시군.localeCompare(b.시군,'ko') || (STATUS_ORDER[a.모집상태]??2)-(STATUS_ORDER[b.모집상태]??2);
    });
  } else {
    items = [...items].sort((a,b) => FIELD_ORDER.indexOf(a.분야)-FIELD_ORDER.indexOf(b.분야));
  }
  return items;
}

function render() {
  const items = getFiltered();
  document.getElementById('result-count').innerHTML = `<strong>${items.length}</strong>개 정책`;
  if (items.length === 0) {
    document.getElementById('cards').innerHTML = '<div class="empty"><p>조건에 맞는 정책이 없습니다.</p></div>';
    return;
  }
  const SC = {'모집중':'ing','모집예정':'soon','마감':'done','미정':'unknown'};
  const FC = (f) => (f||'').replace(/ㆍ/g,'').replace(/\s/g,'');
  document.getElementById('cards').innerHTML = items.map(d => {
    const st = d.모집상태||'미정';
    const sc = SC[st]||'unknown';
    const isGG = d.시군 === '경기도';
    const recruitText = (d.모집시기||'시기 미정').replace(/\n/g,' ').substring(0,35);
    return `<div class="card status-${sc}" onclick="openModal(${DATA.indexOf(d)})">
      <div class="card-badges">
        <span class="badge badge-status-${st}">${st}</span>
        <span class="badge ${isGG?'badge-경기도':'badge-city'}">${isGG?'🌐 경기도 광역':d.시군}</span>
        <span class="badge badge-field-${FC(d.분야)}">${d.분야||''}</span>
      </div>
      <div class="card-title">${d.사업명||''}</div>
      <div class="card-recruit">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span class="card-recruit-text ${sc}">${recruitText}</span>
      </div>
      ${d.주요내용 ? `<div class="card-summary">${(d.주요내용).substring(0,80)}...</div>` : ''}
      <div class="card-footer">
        <span class="card-org">${d.운영기관||d.문의처||''}</span>
        ${d.링크 ? `<a class="card-link" href="${d.링크}" target="_blank" onclick="event.stopPropagation()">신청하기 →</a>` : ''}
      </div>
    </div>`;
  }).join('');
}

function openModal(idx) {
  const d = DATA[idx]; currentItem = d;
  const st = d.모집상태||'미정';
  const sc = {'모집중':'ing','모집예정':'soon','마감':'done','미정':'unknown'}[st]||'unknown';
  const FC = (f) => (f||'').replace(/ㆍ/g,'').replace(/\s/g,'');
  const isGG = d.시군 === '경기도';
  document.getElementById('modal-badges').innerHTML =
    `<span class="badge badge-status-${st}">${st}</span>
     <span class="badge ${isGG?'badge-경기도':'badge-city'}">${isGG?'🌐 경기도 광역':d.시군}</span>
     <span class="badge badge-field-${FC(d.분야)}">${d.분야||''}</span>`;
  document.getElementById('modal-title').textContent = d.사업명||'';
  document.getElementById('modal-content').textContent = d.주요내용||'-';
  document.getElementById('modal-info').innerHTML = `
    <div class="modal-item"><div class="modal-item-label">📅 모집시기</div><div class="modal-item-value ${sc}">${d.모집시기||'미정'}</div></div>
    <div class="modal-item"><div class="modal-item-label">📝 신청방법</div><div class="modal-item-value">${d.신청방법||'-'}</div></div>
    <div class="modal-item"><div class="modal-item-label">🏢 운영기관</div><div class="modal-item-value">${d.운영기관||'-'}</div></div>
    <div class="modal-item"><div class="modal-item-label">📞 문의처</div><div class="modal-item-value">${d.문의처||'-'}</div></div>`;
  document.getElementById('btn-link').style.display = d.링크 ? '' : 'none';
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function copyContact() {
  if (!currentItem) return;
  const text = `[${currentItem.사업명}]\n문의처: ${currentItem.문의처||'-'}\n신청방법: ${currentItem.신청방법||'-'}`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btn-copy');
    btn.textContent = '✅ 복사됨!';
    setTimeout(()=>{ btn.textContent='📋 문의처 복사'; }, 2000);
  });
}

function openLink() { if (currentItem?.링크) window.open(currentItem.링크, '_blank'); }

function toggleStatus(status, el) {
  if (state.statuses.has(status)) {
    if (state.statuses.size === 1) return;
    state.statuses.delete(status); el.classList.remove('active');
  } else { state.statuses.add(status); el.classList.add('active'); }
  render();
}
function setCity(city, el) {
  state.city = city;
  document.querySelectorAll('[data-city]').forEach(c=>c.classList.remove('active'));
  el.classList.add('active'); render();
}
function setField(field, el) {
  state.field = field;
  document.querySelectorAll('[data-field]').forEach(c=>c.classList.remove('active'));
  el.classList.add('active'); render();
}
document.getElementById('search').addEventListener('input', e => { state.query=e.target.value.trim(); render(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
</script>
</body>
</html>
